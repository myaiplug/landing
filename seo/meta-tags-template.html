<!-- ============================================
  Meta Tags Template - MyAiPlug.com
  Inject into <head> of every page
  Last updated: 2026-05-21
  ============================================

  USAGE:
  1. Copy the entire <head> block below
  2. Replace {VARIABLES} per page
  3. Replace PAGE-SPECIFIC JSON-LD with appropriate schema
  4. Use the per-page quick-reference table at the bottom
-->

<head>
  <!-- === CHARSET & VIEWPORT === -->
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />

  <!-- === TITLE (50-60 chars) === -->
  <title>{PAGE_TITLE} | MyAiPlug - AI Audio Creation Hub</title>

  <!-- === META DESCRIPTION (150-160 chars) === -->
  <meta name="description" content="{META_DESCRIPTION}" />

  <!-- === META KEYWORDS === -->
  <meta name="keywords" content="{KEYWORDS_COMMA_SEPARATED}" />

  <!-- === META ROBOTS === -->
  <meta name="robots" content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1" />
  <!-- FOR ADMIN PAGES: <meta name="robots" content="noindex, nofollow" /> -->

  <!-- === CANONICAL === -->
  <link rel="canonical" href="{CANONICAL_URL}" />

  <!-- === HREFLANG === -->
  <link rel="alternate" href="https://myaiplug.com/" hreflang="x-default" />
  <link rel="alternate" href="https://myaiplug.com/" hreflang="en" />
  <link rel="alternate" href="https://myaiplug.com/" hreflang="en-US" />

  <!-- === OPEN GRAPH (Facebook, LinkedIn, Discord, Slack) === -->
  <meta property="og:type" content="{OG_TYPE}" />
  <!-- og:type: website for homepage, article for blog, product for product pages -->
  <meta property="og:title" content="{OG_TITLE}" />
  <meta property="og:description" content="{OG_DESCRIPTION}" />
  <meta property="og:url" content="{CANONICAL_URL}" />
  <meta property="og:site_name" content="MyAiPlug" />
  <meta property="og:image" content="{OG_IMAGE_URL}" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:image:alt" content="{OG_IMAGE_ALT}" />
  <meta property="og:locale" content="en_US" />
  <meta property="og:updated_time" content="{LAST_UPDATED_ISO}" />

  <!-- === TWITTER CARD (X/Twitter) === -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:site" content="@myaiplug" />
  <meta name="twitter:creator" content="@myaiplug" />
  <meta name="twitter:title" content="{TWITTER_TITLE}" />
  <meta name="twitter:description" content="{TWITTER_DESCRIPTION}" />
  <meta name="twitter:image" content="{TWITTER_IMAGE_URL}" />
  <meta name="twitter:image:alt" content="{TWITTER_IMAGE_ALT}" />

  <!-- === ADDITIONAL METADATA === -->
  <meta name="author" content="MyAiPlug" />
  <meta name="generator" content="MyAiPlug Platform" />
  <meta name="application-name" content="MyAiPlug" />
  <meta name="theme-color" content="#0d1117" />
  <meta name="color-scheme" content="dark" />

  <!-- === FAVICON / APP ICONS === -->
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
  <link rel="manifest" href="/site.webmanifest" />
  <meta name="msapplication-TileColor" content="#0d1117" />
  <meta name="msapplication-config" content="/browserconfig.xml" />

  <!-- === STRUCTURED DATA (JSON-LD) === -->

  <!-- 1. Organization schema (site-wide, every page) -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Organization",
    "@id": "https://myaiplug.com/#organization",
    "name": "MyAiPlug",
    "alternateName": "Producer Gear",
    "url": "https://myaiplug.com",
    "logo": {
      "@type": "ImageObject",
      "url": "https://myaiplug.com/images/logo.png"
    },
    "sameAs": [
      "https://twitter.com/myaiplug",
      "https://www.youtube.com/@myaiplug",
      "https://www.instagram.com/myaiplug",
      "https://www.tiktok.com/@myaiplug",
      "https://discord.gg/myaiplug",
      "https://github.com/myaiplug",
      "https://www.reddit.com/r/myaiplug"
    ]
  }
  </script>

  <!-- 2. WebSite schema with SearchAction (site-wide, every page) -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebSite",
    "@id": "https://myaiplug.com/#website",
    "url": "https://myaiplug.com",
    "name": "MyAiPlug",
    "alternateName": "MyAiPlug - AI Audio Creation Hub",
    "publisher": {
      "@id": "https://myaiplug.com/#organization"
    },
    "potentialAction": {
      "@type": "SearchAction",
      "target": {
        "@type": "EntryPoint",
        "urlTemplate": "https://myaiplug.com/search?q={search_term_string}"
      },
      "query-input": "required name=search_term_string"
    }
  }
  </script>

  <!-- 3. BreadcrumbList schema (every page) -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "BreadcrumbList",
    "itemListElement": [
      {
        "@type": "ListItem",
        "position": 1,
        "name": "Home",
        "item": "https://myaiplug.com/"
      },
      {
        "@type": "ListItem",
        "position": 2,
        "name": "{BREADCRUMB_CATEGORY}",
        "item": "https://myaiplug.com/{BREADCRUMB_CATEGORY_PATH}"
      },
      {
        "@type": "ListItem",
        "position": 3,
        "name": "{BREADCRUMB_PAGE_NAME}",
        "item": "{CANONICAL_URL}"
      }
    ]
  }
  </script>

  <!-- 4. PAGE-SPECIFIC JSON-LD -->
  <!-- REPLACE THIS BLOCK with the appropriate schema for each page:

    HOMEPAGE:
      WebPage + CollectionPage schema

    PRODUCT PAGE:
      Product + Offer schema

    TOOL PAGE:
      SoftwareApplication schema

    BLOG POST:
      Article + FAQPage schema

    SERVICE PAGE:
      Service schema
  -->
  {PAGE_SPECIFIC_JSON_LD}

  <!-- === PRELOAD / PREFETCH === -->
  <link rel="preconnect" href="https://js.stripe.com" />
  <link rel="dns-prefetch" href="https://js.stripe.com" />
  <link rel="preload" href="/fonts/inter-var.woff2" as="font" type="font/woff2" crossorigin="anonymous" />

  <!-- === STYLESHEET === -->
  {STYLESHEET_LINKS}

</head>
